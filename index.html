<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Module Recherche Juridique — ExpertAssur</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,.08);
    --text: #e8eaf6;
    --text2: #8890b0;
    --text3: #545878;
    --accent: #4f6bef;
    --accent2: #7c8ef5;
    --gold: #e8a830;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .header-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title {
    font-size: 17px; font-weight: 800; color: var(--text);
    flex: 1;
  }
  .header-title span { color: var(--accent2); }
  .header-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    background: rgba(79,107,239,.2); color: var(--accent2);
    border-radius: 20px; border: 1px solid rgba(79,107,239,.3);
  }

  /* SEARCH BAR */
  .search-section {
    padding: 20px 20px 0;
  }
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 100%; padding: 14px 50px 44px 46px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    transition: border-color .15s;
    outline: none;
    resize: none;
    min-height: 52px;
    line-height: 1.5;
    overflow-y: hidden;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; left: 14px; top: 16px;
    color: var(--text3); font-size: 18px; pointer-events: none;
  }
  .search-btn {
    position: absolute; right: 8px; bottom: 8px;
    padding: 7px 14px; background: var(--accent);
    border: none; border-radius: 8px; color: #fff;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity .15s;
  }
  .search-btn:active { opacity: .8; }
  .search-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* TABS */
  .tabs-wrap {
    position: sticky; top: 65px; z-index: 90;
    background: rgba(15,17,23,.95); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .tabs {
    display: flex; gap: 0; overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 13px 16px;
    font-size: 13px; font-weight: 700; color: var(--text3);
    border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s; white-space: nowrap;
  }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* MAIN CONTENT */
  .main { padding: 16px 20px; max-width: 900px; margin: 0 auto; }

  /* WELCOME STATE */
  .welcome {
    text-align: center; padding: 60px 20px;
  }
  .welcome-icon { font-size: 56px; margin-bottom: 16px; }
  .welcome-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .welcome-sub { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 32px; }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .suggestion-chip {
    padding: 8px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 12px; color: var(--text2); cursor: pointer;
    transition: all .15s;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent2); }

  /* LOADING */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text2); font-style: italic; }

  /* RESULTS */
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .results-count {
    font-size: 13px; color: var(--text2);
  }
  .results-count strong { color: var(--accent2); }
  .results-query {
    font-size: 12px; color: var(--text3); font-style: italic;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .result-card:hover { border-color: rgba(79,107,239,.4); transform: translateX(2px); }
  .result-card.expanded { border-color: var(--accent); }

  .result-type {
    display: inline-block; font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .8px;
    padding: 2px 8px; border-radius: 4px; margin-bottom: 8px;
  }
  .result-type.code { background: rgba(79,107,239,.15); color: var(--accent2); }
  .result-type.jurisprudence { background: rgba(232,168,48,.15); color: var(--gold); }
  .result-type.reglement { background: rgba(34,197,94,.15); color: var(--green); }
  .result-type.jo { background: rgba(239,68,68,.15); color: var(--red); }

  .result-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 4px; line-height: 1.4;
  }
  .result-ref {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--text3); margin-bottom: 8px;
  }
  .result-excerpt {
    font-size: 13px; color: var(--text2); line-height: 1.6;
  }
  .result-excerpt em { color: var(--accent2); font-style: normal; font-weight: 600; }

  .result-full {
    display: none; margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .result-full.open { display: block; }
  .result-full-text {
    font-size: 14px; color: var(--text); line-height: 1.8;
    white-space: pre-wrap;
  }
  .result-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .result-btn {
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 12px; font-weight: 700; cursor: pointer;
    background: var(--surface2); color: var(--text2);
    transition: all .15s;
  }
  .result-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .result-btn.primary {
    background: rgba(79,107,239,.15); border-color: rgba(79,107,239,.4);
    color: var(--accent2);
  }

  /* HISTORY */
  .history-section { margin-top: 24px; }
  .history-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--text3); margin-bottom: 10px;
  }
  .history-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 6px; cursor: pointer;
    transition: border-color .15s;
  }
  .history-item:hover { border-color: rgba(79,107,239,.4); }
  .history-icon { font-size: 13px; }
  .history-text { flex: 1; font-size: 13px; color: var(--text2); }
  .history-tab { font-size: 10px; color: var(--text3); }
  .history-del {
    font-size: 14px; color: var(--text3); background: none;
    border: none; cursor: pointer; padding: 2px 6px;
  }

  /* ERROR */
  .error-box {
    background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3);
    border-radius: var(--radius); padding: 16px; margin: 20px 0;
    font-size: 14px; color: var(--red); line-height: 1.6;
  }

  /* EMPTY */
  .empty-state {
    text-align: center; padding: 50px 20px;
    color: var(--text3); font-size: 14px;
  }

  /* SAFE BOTTOM */
  .bottom-safe { height: calc(20px + var(--safe-bottom)); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (min-width: 640px) {
    .main { padding: 24px 32px; }
    .search-section { padding: 24px 32px 0; }
    .tabs-wrap { padding: 0 32px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚖️</div>
  <div class="header-title">Recherche <span>Juridique</span></div>
  <div class="header-badge">ExpertAssur</div>
</div>

<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <textarea class="search-input" id="search-input" rows="1"
      placeholder="Rechercher un article, une jurisprudence, un texte…"
      autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <button class="search-btn" id="search-btn" onclick="doSearch()">Chercher</button>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-tab="codes" onclick="switchTab('codes')">📚 Codes</button>
    <button class="tab" data-tab="jurisprudences" onclick="switchTab('jurisprudences')">⚖️ Jurisprudences</button>
    <button class="tab" data-tab="reglements" onclick="switchTab('reglements')">📋 Règlements</button>
    <button class="tab" data-tab="jo" onclick="switchTab('jo')">📰 Journal Officiel</button>
  </div>
</div>

<div class="main" id="main-content">
  <!-- Contenu dynamique -->
</div>

<script>
// ── CONFIG ──
const OPENLEGI_TOKEN = '51877e539a8986fabc24b971ce5844bd974e4ccb9c568638f53d9413a0e9c6ef';
const LS_HISTORY     = 'expertassur_juridique_history';

let currentTab   = 'codes';
let currentQuery = '';
let searchHistory = [];
let isLoading    = false;

// Suggestions par onglet
const SUGGESTIONS = {
  codes: [
    'Article 1382 Code civil', 'Article L121-1 Code des assurances',
    'Convention IRSI', 'Article 1240 responsabilité civile',
    'Garantie décennale article 1792'
  ],
  jurisprudences: [
    'Dégât des eaux responsabilité', 'Sinistre incendie assurance',
    'Vétusté mobilier', 'Catastrophe naturelle indemnisation',
    'Expertise contradictoire'
  ],
  reglements: [
    'DTU 60.1 plomberie', 'DTU 40.35 couverture',
    'DTU 20.1 maçonnerie', 'NF P 10-202',
    'Arrêté catastrophe naturelle'
  ],
  jo: [
    'Arrêté catastrophe naturelle 2025',
    'Décret assurance habitation',
    'Loi Spinetta garantie décennale'
  ]
};

const TAB_LABELS = {
  codes: 'articles de codes législatifs français (Code civil, Code des assurances, etc.)',
  jurisprudences: 'jurisprudences et décisions de justice françaises',
  reglements: 'textes réglementaires, DTU, normes et arrêtés',
  jo: 'publications et textes du Journal Officiel français'
};

// ── INIT ──
function init() {
  loadHistory();
  renderWelcome();
  const ta = document.getElementById('search-input');
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSearch(); }
  });
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });
}

// ── TAB ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  if (currentQuery) doSearch();
  else renderWelcome();
}

// ── SEARCH via Claude API + MCP OpenLégis ──
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q || isLoading) return;
  currentQuery = q;
  addToHistory(q, currentTab);
  showLoading();

  try {
    const results = await searchViaClaudeAPI(q, currentTab);
    renderResults(results, q);
  } catch(e) {
    renderError(e.message || 'Erreur inconnue');
  }
}

async function searchViaClaudeAPI(query, tab) {
  const systemPrompt = `Tu es un assistant juridique expert en droit français, spécialisé en droit des assurances et du bâtiment.
L'utilisateur recherche des ${TAB_LABELS[tab]}.
Utilise le serveur MCP OpenLégis / Légifrance pour rechercher : "${query}"

Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, sans texte avant ou après.
Format requis :
{
  "results": [
    {
      "title": "Titre de l'article ou décision",
      "ref": "Référence (ex: Article 1240, Cass. civ. 2e, 15 juin 2023)",
      "excerpt": "Extrait ou résumé du contenu (200-300 mots)",
      "fullText": "Texte intégral si disponible",
      "url": "URL Légifrance si disponible"
    }
  ],
  "count": 0
}
Si aucun résultat, retourne {"results":[],"count":0}.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: 'user', content: `Recherche : ${query}` }],
      mcp_servers: [{
        type: 'url',
        url: `https://www.openlegi.fr/mcp/token/${OPENLEGI_TOKEN}`,
        name: 'openlegi'
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Erreur API ${response.status}`);
  }

  const data = await response.json();
  const text = data.content
    ?.filter(c => c.type === 'text')
    .map(c => c.text)
    .join('') || '';

  // Nettoyer et parser le JSON
  const clean = text.replace(/```json|```/g, '').trim();
  try {
    const parsed = JSON.parse(clean);
    return parsed.results || [];
  } catch {
    // Si pas de JSON valide, retourner le texte brut comme résultat unique
    if (text.trim()) {
      return [{
        title: `Résultats pour "${query}"`,
        ref: '',
        excerpt: text.slice(0, 400),
        fullText: text,
        url: ''
      }];
    }
    return [];
  }
}

// ── RENDER ──
function renderWelcome() {
  const suggestions = SUGGESTIONS[currentTab];
  document.getElementById('main-content').innerHTML = `
    <div class="welcome">
      <div class="welcome-icon">📖</div>
      <div class="welcome-title">Recherche juridique française</div>
      <div class="welcome-sub">
        Interrogez les codes français, jurisprudences,<br>
        textes réglementaires et Journal Officiel.
      </div>
      <div class="suggestions">
        ${suggestions.map(s => `
          <button class="suggestion-chip" onclick="fillAndSearch('${s.replace(/'/g,"\\'")}')">
            ${s}
          </button>`).join('')}
      </div>
    </div>
    ${renderHistorySection()}
  `;
}

function renderHistorySection() {
  const tabHistory = searchHistory.filter(h => h.tab === currentTab).slice(0, 5);
  if (tabHistory.length === 0) return '';
  return `
    <div class="history-section">
      <div class="history-title">🕐 Recherches récentes</div>
      ${tabHistory.map((h, i) => `
        <div class="history-item" onclick="fillAndSearch('${h.query.replace(/'/g,"\\'")}')">
          <span class="history-icon">🔍</span>
          <span class="history-text">${h.query}</span>
          <button class="history-del" onclick="event.stopPropagation();removeHistory(${i})">✕</button>
        </div>`).join('')}
    </div>`;
}

function showLoading() {
  isLoading = true;
  document.getElementById('search-btn').disabled = true;
  document.getElementById('main-content').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Recherche en cours via Légifrance…</div>
    </div>`;
}

function renderResults(results, query) {
  isLoading = false;
  document.getElementById('search-btn').disabled = false;

  if (!results || results.length === 0) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        Aucun résultat trouvé pour <strong>"${query}"</strong><br>
        Essayez des termes différents ou changez d'onglet.
      </div>`;
    return;
  }

  const typeLabels = { codes:'code', jurisprudences:'jurisprudence', reglements:'reglement', jo:'jo' };
  const typeNames  = { codes:'Code', jurisprudences:'Jurisprudence', reglements:'Règlement', jo:'J.O.' };

  document.getElementById('main-content').innerHTML = `
    <div class="results-header">
      <div>
        <div class="results-count"><strong>${results.length}</strong> résultat${results.length > 1 ? 's' : ''}</div>
        <div class="results-query">"${query}"</div>
      </div>
    </div>
    ${results.map((r, i) => `
      <div class="result-card" id="card-${i}" onclick="toggleCard(${i})">
        <span class="result-type ${typeLabels[currentTab]}">${typeNames[currentTab]}</span>
        <div class="result-title">${r.title}</div>
        ${r.ref ? `<div class="result-ref">${r.ref}</div>` : ''}
        <div class="result-excerpt">${highlightQuery(r.excerpt || 'Cliquer pour voir le contenu complet', query)}</div>
        <div class="result-full" id="full-${i}">
          <div class="result-full-text">${r.fullText || r.excerpt || 'Contenu non disponible'}</div>
          <div class="result-actions">
            ${r.url ? `<button class="result-btn primary" onclick="event.stopPropagation();window.open('${r.url}','_blank')">🔗 Voir sur Légifrance</button>` : ''}
            <button class="result-btn" onclick="event.stopPropagation();copyText('${i}')">📋 Copier</button>
          </div>
        </div>
      </div>`).join('')}
    <div class="bottom-safe"></div>`;

  window._results = results;
}

function renderError(msg) {
  isLoading = false;
  document.getElementById('search-btn').disabled = false;
  document.getElementById('main-content').innerHTML = `
    <div class="error-box">
      <strong>⚠️ Erreur de connexion</strong><br>${msg}<br><br>
      <small>Vérifiez votre connexion internet. Le service OpenLégis peut également être temporairement indisponible.</small>
    </div>
    ${renderHistorySection()}`;
}

// ── INTERACTIONS ──
function toggleCard(i) {
  const card = document.getElementById(`card-${i}`);
  const full  = document.getElementById(`full-${i}`);
  const isOpen = full.classList.contains('open');
  document.querySelectorAll('.result-full.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.result-card.expanded').forEach(el => el.classList.remove('expanded'));
  if (!isOpen) { full.classList.add('open'); card.classList.add('expanded'); }
}

function copyText(i) {
  const r = window._results?.[i];
  if (!r) return;
  navigator.clipboard.writeText((r.fullText || r.excerpt || r.title) + '\n\n' + (r.ref || '')).then(() => {
    showToast('📋 Copié dans le presse-papier');
  });
}

function fillAndSearch(q) {
  document.getElementById('search-input').value = q;
  doSearch();
}

function highlightQuery(text, query) {
  if (!text || !query) return text;
  const words = query.split(/\s+/).filter(w => w.length > 2);
  let result = text;
  words.forEach(w => {
    result = result.replace(new RegExp(`(${w})`, 'gi'), '<em>$1</em>');
  });
  return result;
}

// ── HISTORY ──
function loadHistory() {
  try { searchHistory = JSON.parse(localStorage.getItem(LS_HISTORY) || '[]'); } catch { searchHistory = []; }
}

function addToHistory(query, tab) {
  searchHistory = searchHistory.filter(h => !(h.query === query && h.tab === tab));
  searchHistory.unshift({ query, tab, ts: Date.now() });
  if (searchHistory.length > 30) searchHistory = searchHistory.slice(0, 30);
  localStorage.setItem(LS_HISTORY, JSON.stringify(searchHistory));
}

function removeHistory(i) {
  const tabHistory = searchHistory.filter(h => h.tab === currentTab);
  const item = tabHistory[i];
  searchHistory = searchHistory.filter(h => h !== item);
  localStorage.setItem(LS_HISTORY, JSON.stringify(searchHistory));
  renderWelcome();
}

// ── TOAST ──
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;transition:transform .25s;white-space:nowrap;opacity:0;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.transform = 'translateX(-50%) translateY(0)';
  t.style.opacity = '1';
  setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(60px)'; t.style.opacity = '0'; }, 2500);
}

init();
</script>
</body>
</html>
